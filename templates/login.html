{% extends 'base.html' %}

{% block title %}登录 - {{ get_app_name() }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header" style="background-color: #2563eb; color: white; font-weight: 600; border-bottom: none; padding: 1rem 1.5rem; border-radius: 10px 10px 0 0 !important;">
                <h3 class="text-center mb-0" style="color: white; font-weight: 600;">用户登录</h3>
            </div>
            <div class="card-body" style="padding: 1.5rem;">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-4">
                        <label for="username" class="form-label" style="font-weight: 600; color: #111827; margin-bottom: 0.5rem;">用户名</label>
                        <input type="text" class="form-control" id="username" name="username" required placeholder="请输入您的用户名" value="wst" style="border: 1px solid #d1d5db; border-radius: 6px; padding: 0.625rem 0.875rem;">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label" style="font-weight: 600; color: #111827; margin-bottom: 0.5rem;">密码</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="请输入您的密码" value="" style="border: 1px solid #d1d5db; border-radius: 6px; padding: 0.625rem 0.875rem;">
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember" style="color: #6b7280;">记住我</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2" style="font-weight: 500; background-color: #2563eb; border-color: #2563eb; border-radius: 6px; padding: 0.625rem 1.5rem; min-height: 40px;">登录</button>
                </form>
                <div class="mt-3 text-center">
                    <small style="color: #6b7280;">默认用户名和密码请查看“README.md”文件</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
