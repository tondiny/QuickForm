<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析报告 - {{ task_title if task_title else '任务' }} - {{ get_app_name() }}</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.8;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        h1 {
            color: #1a1a1a;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #2563eb;
        }
        h2 {
            color: #374151;
            font-size: 22px;
            margin-bottom: 16px;
        }
        .alert {
            background-color: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: 8px;
            padding: 20px;
            margin-top: 24px;
        }
        .alert h4 {
            color: #92400e;
            margin-top: 0;
            margin-bottom: 12px;
        }
        .alert p {
            color: #92400e;
            margin: 8px 0;
        }
        .meta-info {
            background-color: #f8f9fa;
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 24px;
            border-left: 4px solid #2563eb;
        }
        .meta-info p {
            margin: 8px 0;
            color: #555;
        }
        .meta-info strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>分析报告</h1>
        <div class="meta-info">
            <p><strong>任务标题：</strong>{{ task_title if task_title else '未知任务' }}</p>
        </div>
        <div class="alert" role="alert">
            <h4>暂无分析报告</h4>
            <p>此任务尚未生成分析报告或报告文件丢失。</p>
            <p>请点击"智能分析"按钮生成新的分析报告。</p>
        </div>
    </div>
</body>
</html>
